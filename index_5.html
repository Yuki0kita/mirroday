<script>
/* =========================================================================
   Before/After 記録 — 完全版 (static single-file, melta UI)
   保存: IndexedDB（photos: 画像Blob / kv: 設定・目標・使用量）。
   非対応環境では in-memory フォールバック。
   ========================================================================= */
const CATEGORIES = [
  {id:'muscle',label:'筋トレ'},{id:'diet',label:'ダイエット'},{id:'skin',label:'肌'},
  {id:'hair',label:'髪'},{id:'teeth',label:'歯'},{id:'other',label:'その他'}
];
const catLabel = id => (CATEGORIES.find(c=>c.id===id)||{label:'その他'}).label;
const FREE_PHOTO_LIMIT = 20, FREE_POST_LIMIT = 3;

const BADGES = [
  {id:'p1',type:'count',n:1,label:'はじめの一枚'},
  {id:'p10',type:'count',n:10,label:'10枚記録'},
  {id:'p30',type:'count',n:30,label:'30枚記録'},
  {id:'s7',type:'streak',n:7,label:'7日継続'},
  {id:'s30',type:'streak',n:30,label:'30日継続'},
  {id:'s90',type:'streak',n:90,label:'90日継続'},
  {id:'cat3',type:'cats',n:3,label:'3カテゴリ'},
  {id:'cmp',type:'count',n:2,label:'比較デビュー'}
];

/* ---------- storage ---------- */
const Store = (() => {
  const DB='ba_record_full', PH='photos', KV='kv'; let db=null;
  const memPh=new Map(), memKv=new Map(); let memMode=false;
  function open(){
    return new Promise(res=>{
      if(!('indexedDB' in window)){ memMode=true; return res(); }
      let req; try{ req=indexedDB.open(DB,1); }catch(e){ memMode=true; return res(); }
      req.onupgradeneeded=e=>{ const d=e.target.result;
        if(!d.objectStoreNames.contains(PH)) d.createObjectStore(PH,{keyPath:'id'});
        if(!d.objectStoreNames.contains(KV)) d.createObjectStore(KV,{keyPath:'k'});
      };
      req.onsuccess=e=>{ db=e.target.result; res(); };
      req.onerror=()=>{ memMode=true; res(); };
    });
  }
  const tx=(s,m)=>db.transaction(s,m).objectStore(s);
  function addPhoto(r){ if(memMode){ memPh.set(r.id,r); return Promise.resolve(); }
    return new Promise((res,rej)=>{ const t=db.transaction(PH,'readwrite'); t.objectStore(PH).put(r); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
  function delPhoto(id){ if(memMode){ memPh.delete(id); return Promise.resolve(); }
    return new Promise((res,rej)=>{ const t=db.transaction(PH,'readwrite'); t.objectStore(PH).delete(id); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
  function allPhotos(){ if(memMode) return Promise.resolve([...memPh.values()]);
    return new Promise((res,rej)=>{ const r=tx(PH,'readonly').getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); }); }
  function getKv(k){ if(memMode) return Promise.resolve(memKv.get(k));
    return new Promise((res,rej)=>{ const r=tx(KV,'readonly').get(k); r.onsuccess=()=>res(r.result?r.result.v:undefined); r.onerror=()=>rej(r.error); }); }
  function setKv(k,v){ if(memMode){ memKv.set(k,v); return Promise.resolve(); }
    return new Promise((res,rej)=>{ const t=db.transaction(KV,'readwrite'); t.objectStore(KV).put({k,v}); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
  return { open, addPhoto, delPhoto, allPhotos, getKv, setKv, get isMemory(){return memMode;} };
})();

const urlCache=new Map();
function urlFor(p){ if(urlCache.has(p.id)) return urlCache.get(p.id); const u=URL.createObjectURL(p.blob); urlCache.set(p.id,u); return u; }
function ym(d=new Date()){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function postsThisMonth(){ return usage.posts[ym()]||0; }

async function reloadAll(){

  photos=list;
  goal=(await Store.getKv('goal'))||null;

async function bumpPostUsage(){ const k=ym(); usage.posts[k]=(usage.posts[k]||0)+1; await Store.setKv('usage',usage); }

/* ---------- date ---------- */
const today=()=>new Date().toISOString().slice(0,10);
function daysBetween(a,b){ return Math.round(Math.abs(new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000); }
function signedDays(from,to){ return Math.round((new Date(to+'T00:00:00')-new Date(from+'T00:00:00'))/86400000); }
function fmtDate(iso){ const d=new Date(iso+'T00:00:00'); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

function renderStreak(){
  const b=document.getElementById('streak-badge');
  if(!photos.length){ b.textContent='継続 0日'; return; }
  const dates=photos.map(p=>p.takenDate).sort();
  b.textContent=`継続 ${daysBetween(dates[0],today())}日`;
}

/* ---------- helpers ---------- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* ---------- badges / goal computation ---------- */
function streakDays(){ if(!photos.length) return 0; const d=photos.map(p=>p.takenDate).sort(); return daysBetween(d[0],today()); }
function earnedBadge(b){
  if(b.type==='count') return photos.length>=b.n;
  if(b.type==='streak') return streakDays()>=b.n;
  if(b.type==='cats') return new Set(photos.map(p=>p.category)).size>=b.n;
  return false;
}
function goalProgress(){
  if(!goal) return null;
  const weighed=photos.filter(p=>p.weight!=null).sort((a,b)=>a.takenDate<b.takenDate?-1:1);
  const current=weighed.length?weighed[weighed.length-1].weight:goal.start;
  const start=goal.start, target=goal.target;
  let pct=0;
  if(target!==start) pct=((current-start)/(target-start))*100;
  pct=Math.max(0,Math.min(100,Math.round(pct)));
  const rem=signedDays(today(),goal.date);
  return { current, start, target, pct, rem };
}

function trendChart(){
  const pts=photos.filter(p=>p.weight!=null).map(p=>({d:p.takenDate,v:p.weight})).sort((a,b)=>a.d<b.d?-1:1);
  if(pts.length<2) return `<p class="text-sm text-slate-500 text-center py-6">体重を2回以上記録すると推移が表示されます</p>`;
  const W=320,H=120,pad=8;
  const vs=pts.map(p=>p.v), mn=Math.min(...vs), mx=Math.max(...vs), span=(mx-mn)||1;
  const x=i=>pad+(i/(pts.length-1))*(W-pad*2);
  const y=v=>pad+(1-(v-mn)/span)*(H-pad*2);
  const d=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.v).toFixed(1)}`).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.5" fill="#2b70ef"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="w-full h-auto"><path d="${d}" fill="none" stroke="#2b70ef" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>
    <div class="flex justify-between text-xs text-slate-500 mt-1"><span>${pts[0].v}kg</span><span>${pts[pts.length-1].v}kg</span></div>`;
}

function buildStage(before,after){
  const stage=document.getElementById('cmp-stage'); if(!before||!after){ stage.innerHTML=''; return; }

    stage.className='relative w-full grid grid-cols-2 gap-1 rounded-lg bg-gray-50 border border-slate-200 overflow-hidden';

    stage.className='relative w-full aspect-[3/4] overflow-hidden rounded-lg bg-gray-50 border border-slate-200';
    stage.innerHTML=`<img src="${bU}" class="absolute inset-0 w-full h-full object-cover" alt="Before"/><img id="ov-after" src="${aU}" class="absolute inset-0 w-full h-full object-cover" style="opacity:${cmp.overlay/100}" alt="After"/><span class="absolute top-2 left-2 bg-slate-900/70 text-white text-xs font-medium px-2 py-0.5 rounded">Before</span><span class="absolute top-2 right-2 bg-primary-500 text-white text-xs font-medium px-2 py-0.5 rounded">After</span>`;

    const fix=()=>{ const w=stage.clientWidth; const img=stage.querySelector('#sl-clip img'); if(img) img.style.width=w+'px'; };
    requestAnimationFrame(fix);

}

/* =========================================================================
   Change animation (preview + WebM record)
   ========================================================================= */
let animRAF=null, animRec=null;
function stopAnim(){ if(animRAF){ cancelAnimationFrame(animRAF); animRAF=null; } if(animRec&&animRec.state==='recording'){ try{animRec.stop();}catch(e){} } animRec=null; }
function animPhotos(){ const list=(tlFilter==='all'?photos:photos.filter(p=>p.category===tlFilter)); return [...list].sort((a,b)=>a.takenDate<b.takenDate?-1:1); }
async function initAnimCanvas(){
  const c=document.getElementById('anim-canvas'); if(!c) return;
  c.width=720; c.height=960; const ctx=c.getContext('2d');
  const list=animPhotos();
  ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,c.width,c.height);
  if(!list.length){ return; }
  const img=await loadImg(urlFor(list[0])); coverDraw(ctx,img,0,0,c.width,c.height);
}
async function playAnim(record){
  stopAnim();
  const c=document.getElementById('anim-canvas'); if(!c) return;
  const ctx=c.getContext('2d');
  const list=animPhotos();
  if(list.length<2){ toast('再生には2枚以上必要です'); return; }
  const imgs=await Promise.all(list.map(p=>loadImg(urlFor(p))));
  const first=list[0].takenDate;
  let rec=null, chunks=[];
  if(record){
    if(!c.captureStream || typeof MediaRecorder==='undefined'){ toast('この環境では動画保存に未対応です'); return; }
    try{ const stream=c.captureStream(30); rec=new MediaRecorder(stream,{mimeType:'video/webm'}); }
    catch(e){ toast('この環境では動画保存に未対応です'); return; }
    rec.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
    rec.onstop=()=>{ const blob=new Blob(chunks,{type:'video/webm'}); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download='change_animation.webm'; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); toast('動画を保存しました'); };
    animRec=rec; rec.start();
  }
  const HOLD=700, FADE=450, perFrame=HOLD+FADE;
  const total=record?(perFrame*(imgs.length-1)+HOLD):Infinity;
  const t0=performance.now();
  function frame(now){
    let t=now-t0;
    if(record && t>=total){ if(rec&&rec.state==='recording') rec.stop(); animRAF=null; return; }
    if(!record){ t=t%(perFrame*(imgs.length-1)+HOLD); }
    let idx=Math.floor(t/perFrame); if(idx>=imgs.length-1) idx=imgs.length-2;
    const local=t-idx*perFrame;
    const cur=imgs[idx], nxt=imgs[idx+1];
    ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,c.width,c.height);
    coverDraw(ctx,cur,0,0,c.width,c.height);
    if(local>HOLD){ ctx.globalAlpha=Math.min(1,(local-HOLD)/FADE); coverDraw(ctx,nxt,0,0,c.width,c.height); ctx.globalAlpha=1; }
    const shownIdx=(local>HOLD+FADE/2)?idx+1:idx;
    const d=daysBetween(first,list[shownIdx].takenDate);
    ctx.fillStyle='rgba(15,23,42,0.55)'; ctx.fillRect(0,c.height-90,c.width,90);
    ctx.fillStyle='#fff'; ctx.textBaseline='middle';
    ctx.textAlign='left'; ctx.font='600 30px Inter,"Hiragino Sans",sans-serif'; ctx.fillText(`Day ${d+1}`,28,c.height-45);
    ctx.textAlign='right'; ctx.font='500 26px Inter,"Hiragino Sans",sans-serif'; ctx.fillText(fmtDate(list[shownIdx].takenDate),c.width-28,c.height-45);
    animRAF=requestAnimationFrame(frame);
  }
  animRAF=requestAnimationFrame(frame);
}

/* ---------- canvas shared ---------- */
function loadImg(url){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; }); }
function coverDraw(ctx,img,dx,dy,dw,dh){ const ir=img.width/img.height, dr=dw/dh; let sw,sh,sx,sy; if(ir>dr){ sh=img.height; sw=sh*dr; sx=(img.width-sw)/2; sy=0; } else { sw=img.width; sh=sw/dr; sx=0; sy=(img.height-sh)/2; } ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh); }
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function drawWatermark(ctx,W,H){ if(!settings.watermark) return; const txt=(settings.watermarkText||'Before/After').slice(0,40); ctx.save(); ctx.globalAlpha=0.6; ctx.fillStyle='#ffffff'; ctx.textAlign='right'; ctx.textBaseline='bottom'; ctx.font='500 26px Inter,"Hiragino Sans",sans-serif'; ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=6; ctx.fillText(txt,W-24,H-20); ctx.restore(); }

async function composePost(before,after,dayDiff){
  const W=1080, H=post.format==='square'?1080:1920;
  const c=document.createElement('canvas'); c.width=W; c.height=H; const ctx=c.getContext('2d');
  ctx.fillStyle='#f9fafb'; ctx.fillRect(0,0,W,H);
  const pad=48, gap=24, labelH=64, footH=post.showDay?120:48;
  const innerW=W-pad*2, colW=(innerW-gap)/2, imgTop=pad+labelH, imgH=H-imgTop-footH-pad;
  const [b,a]=await Promise.all([loadImg(urlFor(before)),loadImg(urlFor(after))]);
  ctx.textBaseline='middle'; ctx.textAlign='center'; ctx.font='600 40px Inter,"Hiragino Sans",sans-serif';
  ctx.fillStyle='#3d4b5f'; ctx.fillText('Before',pad+colW/2,pad+labelH/2);
  ctx.fillStyle='#2b70ef'; ctx.fillText('After',pad+colW+gap+colW/2,pad+labelH/2);
  const col=(img,x)=>{ ctx.save(); roundRect(ctx,x,imgTop,colW,imgH,24); ctx.clip(); coverDraw(ctx,img,x,imgTop,colW,imgH); ctx.restore(); ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=2; roundRect(ctx,x,imgTop,colW,imgH,24); ctx.stroke(); };
  col(b,pad); col(a,pad+colW+gap);
  if(post.showDay){ ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='700 56px Inter,"Hiragino Sans",sans-serif'; ctx.fillStyle='#0f172a'; ctx.fillText(dayDiff>0?`${dayDiff}日間の変化`:'変化の記録',W/2,H-pad-60); ctx.font='500 34px Inter,"Hiragino Sans",sans-serif'; ctx.fillStyle='#64748b'; if(dayDiff>0) ctx.fillText(`Day 1  →  Day ${dayDiff+1}`,W/2,H-pad-8); }
  drawWatermark(ctx,W,H);
  return c;
}
async function drawPost(before,after,dayDiff,target){ const c=await composePost(before,after,dayDiff); const ctx=target.getContext('2d'); target.width=c.width; target.height=c.height; ctx.drawImage(c,0,0); }

async function composeSideBySide(before,after){ const W=1200,H=900,pad=24,gap=12,labelH=48; const c=document.createElement('canvas'); c.width=W;c.height=H; const ctx=c.getContext('2d'); ctx.fillStyle='#f9fafb'; ctx.fillRect(0,0,W,H); const colW=(W-pad*2-gap)/2, top=pad+labelH, imgH=H-top-pad; const [b,a]=await Promise.all([loadImg(urlFor(before)),loadImg(urlFor(after))]); ctx.textBaseline='middle';ctx.textAlign='center';ctx.font='600 32px Inter,"Hiragino Sans",sans-serif'; ctx.fillStyle='#3d4b5f'; ctx.fillText('Before',pad+colW/2,pad+labelH/2); ctx.fillStyle='#2b70ef'; ctx.fillText('After',pad+colW+gap+colW/2,pad+labelH/2); const col=(img,x)=>{ctx.save();roundRect(ctx,x,top,colW,imgH,16);ctx.clip();coverDraw(ctx,img,x,top,colW,imgH);ctx.restore();}; col(b,pad); col(a,pad+colW+gap); drawWatermark(ctx,W,H); return c; }
async function composeOverlay(before,after,op){ const [b,a]=await Promise.all([loadImg(urlFor(before)),loadImg(urlFor(after))]); const W=900,H=1200; const c=document.createElement('canvas');c.width=W;c.height=H;const ctx=c.getContext('2d'); coverDraw(ctx,b,0,0,W,H); ctx.globalAlpha=op; coverDraw(ctx,a,0,0,W,H); ctx.globalAlpha=1; drawWatermark(ctx,W,H); return c; }
async function composeSlider(before,after,frac){ const [b,a]=await Promise.all([loadImg(urlFor(before)),loadImg(urlFor(after))]); const W=900,H=1200; const c=document.createElement('canvas');c.width=W;c.height=H;const ctx=c.getContext('2d'); coverDraw(ctx,b,0,0,W,H); const x=Math.round(W*frac); ctx.save(); ctx.beginPath(); ctx.rect(0,0,x,H); ctx.clip(); coverDraw(ctx,a,0,0,W,H); ctx.restore(); ctx.fillStyle='#ffffff'; ctx.fillRect(x-2,0,4,H); drawWatermark(ctx,W,H); return c; }

function canvasToBlob(c){ return new Promise(res=>c.toBlob(res,'image/png')); }
function downloadBlob(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }

async function saveCompare(){
  const before=photos.find(p=>p.id===cmp.beforeId), after=photos.find(p=>p.id===cmp.afterId); if(!before||!after){ toast('Before / After を選択してください'); return; }
  let c; if(cmp.mode==='side') c=await composeSideBySide(before,after); else if(cmp.mode==='overlay') c=await composeOverlay(before,after,cmp.overlay/100); else c=await composeSlider(before,after,cmp.slider/100);
  const blob=await canvasToBlob(c); downloadBlob(blob,`compare_${before.takenDate}_${after.takenDate}.png`); await bumpPostUsage(); toast('比較画像を保存しました');
}
async function savePost(){
  const before=photos.find(p=>p.id===cmp.beforeId), after=photos.find(p=>p.id===cmp.afterId); if(!before||!after){ toast('Before / After を選択してください'); return; }
  const dayDiff=daysBetween(before.takenDate,after.takenDate); const c=await composePost(before,after,dayDiff); const blob=await canvasToBlob(c);
  downloadBlob(blob, post.format==='square'?'post_square.png':'post_story.png'); await bumpPostUsage(); renderPost(); toast('投稿画像をダウンロードしました');
}
async function sharePost(){
  const before=photos.find(p=>p.id===cmp.beforeId), after=photos.find(p=>p.id===cmp.afterId); if(!before||!after) return;
  const dayDiff=daysBetween(before.takenDate,after.takenDate); const c=await composePost(before,after,dayDiff); const blob=await canvasToBlob(c);
  const file=new File([blob],'post.png',{type:'image/png'});
  try{ if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'Before / After'}); await bumpPostUsage(); } else { downloadBlob(blob,'post_square.png'); toast('共有未対応のため画像を保存しました'); } }
  catch(e){ /* user cancelled */ }
}

let camStream=null, camFacing='environment', camGrid=false, camGhostOp=0.4;
async function openCamera(){
  const m=document.getElementById('cam-modal'); m.classList.remove('hidden');
  const err=document.getElementById('cam-error'); err.classList.add('hidden');
  // ghost: latest photo of selected category
  const ghostP=photos.find(p=>p.category===selectedCat)||photos[0];

  else { ghost.classList.add('hidden'); ctrl.classList.add('hidden'); }
  document.getElementById('cam-gridlines').classList.toggle('hidden',!camGrid);

async function startCam(){
  stopCam();
  const v=document.getElementById('cam-video'), err=document.getElementById('cam-error');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ err.textContent='この環境ではカメラを利用できません。ライブラリから選択してください。'; err.classList.remove('hidden'); return; }
  try{ camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing},audio:false}); v.srcObject=camStream; }
  catch(e){ err.textContent='カメラを起動できませんでした。権限を確認するか、ライブラリから選択してください。'; err.classList.remove('hidden'); }
}
function stopCam(){ if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } }

function shoot(){
  const v=document.getElementById('cam-video'); if(!v.videoWidth){ toast('カメラ準備中です'); return; }
  const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight; const ctx=c.getContext('2d');
  if(camFacing==='user'){ ctx.translate(c.width,0); ctx.scale(-1,1); } // mirror front cam
  ctx.drawImage(v,0,0,c.width,c.height);
  c.toBlob(blob=>{ setStaged(blob); closeCamera(); }, 'image/jpeg', 0.92);
}

/* =========================================================================
   Goal modal
   ========================================================================= */
function openGoal(){
  const weighed=photos.filter(p=>p.weight!=null).sort((a,b)=>a.takenDate<b.takenDate?-1:1);
  document.getElementById('g-start').value=goal?goal.start:(weighed.length?weighed[0].weight:'');
  document.getElementById('g-target').value=goal?goal.target:'';
  document.getElementById('g-date').value=goal?goal.date:addDays(today(),90);
  document.getElementById('goal-modal').classList.remove('hidden');
}
function closeGoal(){ document.getElementById('goal-modal').classList.add('hidden'); }

/* =========================================================================
   Data export / import
   ========================================================================= */
function blobToDataURL(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(blob); }); }
async function exportData(){
  toast('バックアップを作成中…');
  const out={ version:1, exportedAt:new Date().toISOString(), settings, goal, usage, photos:[] };
  for(const p of photos){ const dataUrl=await blobToDataURL(p.blob); out.photos.push({ id:p.id, category:p.category, takenDate:p.takenDate, weight:p.weight, bodyFat:p.bodyFat, memo:p.memo, createdAt:p.createdAt, image:dataUrl }); }
  const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
  downloadBlob(blob,`beforeafter_backup_${today()}.json`); toast('バックアップを保存しました');
}
async function importData(file){
  try{
    const text=await file.text(); const data=JSON.parse(text);
    if(!data||!Array.isArray(data.photos)) throw new Error('format');
    if(!confirm(`${data.photos.length}件の記録を読み込みます。続行しますか?`)) return;
    for(const p of data.photos){ const resp=await fetch(p.image); const blob=await resp.blob(); await Store.addPhoto({ id:p.id||uid(), blob, category:p.category||'other', takenDate:p.takenDate||today(), weight:p.weight??null, bodyFat:p.bodyFat??null, memo:p.memo||null, createdAt:p.createdAt||new Date().toISOString() }); }
    if(data.settings) await Store.setKv('settings',data.settings);
    if(data.goal) await Store.setKv('goal',data.goal);
    if(data.usage) await Store.setKv('usage',data.usage);
    urlCache.clear(); await reloadAll(); render(); toast('復元しました');
  }catch(e){ console.error(e); toast('読み込みに失敗しました（形式が不正です）'); }
}

/* =========================================================================
   Events
   ========================================================================= */
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
document.getElementById('fab').addEventListener('click',openAdd);

document.getElementById('add-modal').addEventListener('click',e=>{ if(e.target.dataset.close==='add') closeAdd(); });
document.getElementById('btn-camera').addEventListener('click',openCamera);
document.getElementById('file-input').addEventListener('change',e=>{ const f=e.target.files&&e.target.files[0]; if(f) setStaged(f); e.target.value=''; });
document.getElementById('cat-picker').addEventListener('click',e=>{ const b=e.target.closest('.catc'); if(!b) return; selectedCat=b.dataset.cat; renderCatPicker(); });
document.getElementById('save-photo').addEventListener('click',async()=>{
  if(!stagedBlob) return;
  const rec={ id:uid(), blob:stagedBlob, category:selectedCat, takenDate:document.getElementById('in-date').value||today(), weight:parseFloat(document.getElementById('in-weight').value)||null, bodyFat:parseFloat(document.getElementById('in-fat').value)||null, memo:document.getElementById('in-memo').value.trim()||null, createdAt:new Date().toISOString() };
  try{ await Store.addPhoto(rec); await reloadAll(); closeAdd(); render(); toast('記録を保存しました'); }catch(err){ console.error(err); toast('保存に失敗しました'); }
});

// camera controls
document.getElementById('cam-close').addEventListener('click',closeCamera);
document.getElementById('cam-shot').addEventListener('click',shoot);
document.getElementById('cam-flip').addEventListener('click',async()=>{ camFacing=camFacing==='environment'?'user':'environment'; await startCam(); });
document.getElementById('cam-grid').addEventListener('click',()=>{ camGrid=!camGrid; document.getElementById('cam-gridlines').classList.toggle('hidden',!camGrid); });
document.getElementById('ghost-range').addEventListener('input',e=>{ camGhostOp=(+e.target.value)/100; document.getElementById('cam-ghost').style.opacity=camGhostOp; document.getElementById('ghost-val').textContent=e.target.value+'%'; });

// goal modal
document.getElementById('goal-modal').addEventListener('click',e=>{ if(e.target.dataset.close==='goal') closeGoal(); });
document.getElementById('goal-save').addEventListener('click',async()=>{
  const s=parseFloat(document.getElementById('g-start').value), t=parseFloat(document.getElementById('g-target').value), d=document.getElementById('g-date').value;
  if(isNaN(s)||isNaN(t)||!d){ toast('開始・目標・期限を入力してください'); return; }
  goal={start:s,target:t,date:d}; await Store.setKv('goal',goal); closeGoal(); render(); toast('目標を保存しました');
});
document.getElementById('goal-clear').addEventListener('click',async()=>{ goal=null; await Store.setKv('goal',null); closeGoal(); render(); toast('目標を削除しました'); });

// delegated clicks in main
main.addEventListener('click',async e=>{
  const go=e.target.closest('.go'); if(go){ setTab(go.dataset.go); return; }
  if(e.target.closest('#goal-edit')){ openGoal(); return; }
  const del=e.target.closest('.del'); if(del){ if(confirm('この記録を削除しますか?')){ const id=del.dataset.del; if(cmp.beforeId===id) cmp.beforeId=null; if(cmp.afterId===id) cmp.afterId=null; await Store.delPhoto(id); await reloadAll(); render(); toast('削除しました'); } return; }
  const tlf=e.target.closest('.tlf'); if(tlf){ tlFilter=tlf.dataset.tlf; renderTimeline(); return; }
  const mode=e.target.closest('.cmode'); if(mode){ cmp.mode=mode.dataset.mode; renderCompare(); return; }
  const pick=e.target.closest('.pick'); if(pick){ openPickerSheet(pick.dataset.pick); return; }
  const fmt=e.target.closest('.pfmt'); if(fmt){ post.format=fmt.dataset.fmt; renderPost(); return; }
  if(e.target.closest('#cmp-save')){ saveCompare(); return; }
  if(e.target.closest('#post-save')){ savePost(); return; }
  if(e.target.closest('#post-share')){ sharePost(); return; }
  if(e.target.closest('#anim-play')){ playAnim(false); return; }
  if(e.target.closest('#anim-rec')){ playAnim(true); return; }
  if(e.target.closest('#data-export')){ exportData(); return; }
});
main.addEventListener('input',e=>{
  if(e.target.id==='cmp-range'){ const v=parseInt(e.target.value,10); if(cmp.mode==='overlay'){ cmp.overlay=v; const a=document.getElementById('ov-after'); if(a) a.style.opacity=v/100; } else { cmp.slider=v; const clip=document.getElementById('sl-clip'); const line=document.getElementById('sl-line'); if(clip) clip.style.width=v+'%'; if(line) line.style.left=v+'%'; } }
  if(e.target.id==='post-day'){ post.showDay=e.target.checked; renderPost(); }
  if(e.target.id==='tl-search'){ tlSearch=e.target.value; renderTimelineList(); }
  if(e.target.id==='set-wm'){ settings.watermark=e.target.checked; Store.setKv('settings',settings); }
  if(e.target.id==='set-wmt'){ settings.watermarkText=e.target.value; Store.setKv('settings',settings); }
});
main.addEventListener('change',e=>{
  if(e.target.id==='set-rem'){ settings.reminderDays=parseInt(e.target.value,10)||0; Store.setKv('settings',settings); }
  if(e.target.id==='data-import'){ const f=e.target.files&&e.target.files[0]; if(f) importData(f); e.target.value=''; }
});
// keep search focus: re-render only the list under search box
function renderTimelineList(){ /* lightweight: full re-render preserves input value via state; refocus */ const el=document.getElementById('tl-search'); const pos=el?el.selectionStart:null; renderTimeline(); const ne=document.getElementById('tl-search'); if(ne){ ne.focus(); if(pos!=null) try{ne.setSelectionRange(pos,pos);}catch(_){} } }

// slider drag on stage
main.addEventListener('pointerdown',e=>{
  if(cmp.mode!=='slider'||activeTab!=='compare') return;
  const stage=e.target.closest('#cmp-stage'); if(!stage) return;
  const move=ev=>{ const r=stage.getBoundingClientRect(); let v=Math.round(((ev.clientX-r.left)/r.width)*100); v=Math.max(0,Math.min(100,v)); cmp.slider=v; const clip=document.getElementById('sl-clip'),line=document.getElementById('sl-line'),range=document.getElementById('cmp-range'); if(clip) clip.style.width=v+'%'; if(line) line.style.left=v+'%'; if(range) range.value=v; };
  move(e); const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); }; window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
});

// picker bottom-sheet
function openPickerSheet(role){
  const items=photos.map(p=>`<button data-pid="${p.id}" class="psel relative aspect-square overflow-hidden rounded-lg border border-slate-200 cursor-pointer"><img src="${urlFor(p)}" class="w-full h-full object-cover" alt="候補"/><span class="absolute bottom-1 left-1 bg-slate-900/70 text-white text-xs px-1.5 py-0.5 rounded">${fmtDate(p.takenDate)}</span></button>`).join('');
  const sheet=document.createElement('div'); sheet.className='fixed inset-0 z-40';
  sheet.innerHTML=`<div class="absolute inset-0 bg-slate-900/40" data-pclose></div><div class="absolute inset-x-0 bottom-0 mx-auto max-w-md bg-white rounded-t-2xl border-t border-slate-200 shadow-md max-h-[80vh] flex flex-col"><div class="px-5 pt-4 pb-3 border-b border-slate-200 flex items-center justify-between"><h2 class="text-xl font-bold text-slate-900">${role==='before'?'Before':'After'} を選択</h2><button data-pclose aria-label="閉じる" class="w-10 h-10 inline-flex items-center justify-center rounded-lg hover:bg-gray-50 cursor-pointer text-slate-500"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="p-4 overflow-y-auto"><div class="grid grid-cols-3 gap-3">${items}</div></div></div>`;
  document.body.appendChild(sheet);
  sheet.addEventListener('click',ev=>{ if(ev.target.hasAttribute('data-pclose')){ sheet.remove(); return; } const b=ev.target.closest('.psel'); if(!b) return; if(role==='before') cmp.beforeId=b.dataset.pid; else cmp.afterId=b.dataset.pid; sheet.remove(); activeTab==='post'?renderPost():renderCompare(); });
}

/* =========================================================================
   Boot
   ========================================================================= */
(async function(){
  await Store.open();
  await reloadAll();
  if(Store.isMemory){ setTimeout(()=>toast('この環境では保存は一時的です（公開時は端末内に保存されます）'),600); }
  setTab('home');
})();
</script>
